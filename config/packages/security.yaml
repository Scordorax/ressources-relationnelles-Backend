security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_MODERATOR: [ ROLE_USER ]
        ROLE_ADMIN: [ ROLE_MODERATOR, ROLE_USER ]
        ROLE_SUPER_ADMIN: [ ROLE_ADMIN, ROLE_MODERATOR, ROLE_USER ]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            stateless: true
            custom_authenticators:
                - App\Service\Security\JwtAuthenticator

    access_control:
        # Routes publiques
        - { path: ^/api/auth/register,        roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login,           roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/refresh,         roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/france-connect,  roles: PUBLIC_ACCESS }
        - { path: ^/api/resources$,           roles: PUBLIC_ACCESS, methods: [ GET ] }
        - { path: ^/api/resources/\d+$,       roles: PUBLIC_ACCESS, methods: [ GET ] }
        - { path: ^/api/categories,           roles: PUBLIC_ACCESS, methods: [ GET ] }
        - { path: ^/api/resources/\d+/comments, roles: PUBLIC_ACCESS, methods: [ GET ] }
        - { path: ^/api/stats,                roles: PUBLIC_ACCESS, methods: [ GET ] }

        # Routes protégées par rôle
        - { path: ^/api/superadmin, roles: ROLE_SUPER_ADMIN }
        - { path: ^/api/admin,      roles: ROLE_ADMIN }
        - { path: ^/api/moderator,  roles: ROLE_MODERATOR }
        - { path: ^/api,            roles: ROLE_USER }
